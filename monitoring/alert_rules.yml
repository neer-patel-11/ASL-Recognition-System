groups:
  - name: ml_service_alerts
    rules:

      - alert: HighErrorRate
        expr: |
          (
            rate(prediction_errors_total[5m])
            /
            rate(prediction_requests_total[5m])
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Prediction error rate exceeded 5% in the last 5 minutes."

      - alert: DataDriftDetected
        expr: model_drift_score > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Data drift detected"
          description: "Model input distribution has drifted beyond acceptable threshold (PSI > 0.3)."

      - alert: HighPredictionLatency
        expr: histogram_quantile(0.99, rate(prediction_latency_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "p99 prediction latency exceeded 2 seconds."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage exceeded 80%."

      - alert: HighMemoryUsage
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage"
          description: "Memory usage exceeded 85%."

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "One or more monitored targets are not reachable."

      - alert: NoPredictionTraffic
        expr: rate(prediction_requests_total[5m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No prediction traffic"
          description: "No prediction requests received in the last 5 minutes."

      - alert: TrafficSpike
        expr: rate(prediction_requests_total[1m]) > 3 * rate(prediction_requests_total[5m])
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Traffic spike detected"
          description: "Incoming request rate increased significantly."

      - alert: HighErrorCount
        expr: rate(prediction_errors_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High number of errors"
          description: "More than 10 prediction errors per second."

      - alert: HighLoadAverage
        expr: node_load1 > 4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High system load"
          description: "System load average is too high."