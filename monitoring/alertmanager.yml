global:
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: '${ALERT_SENDER_EMAIL}'
  smtp_auth_username: '${ALERT_SENDER_EMAIL}'
  smtp_auth_password: '${ALERT_EMAIL_PASSWORD}'
  smtp_require_tls: true

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 1m
  repeat_interval: 4h
  receiver: email_team

  routes:
    - match:
        severity: critical
      receiver: email_team
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: email_team

receivers:
  - name: email_team
    email_configs:
      - to: '${ALERT_RECIPIENT_EMAIL}'
        send_resolved: true
        headers:
          Subject: "[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}"
        html: |
          <b>Alert:</b> {{ .CommonAnnotations.summary }}<br>
          <b>Details:</b> {{ .CommonAnnotations.description }}<br>
          <b>Status:</b> {{ .Status }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]